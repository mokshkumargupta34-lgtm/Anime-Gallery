    <script id="fetch-getter-patch">
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch') || Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          if (desc && (!desc.writable || desc.set === undefined)) {
            var actualFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return actualFetch;
              },
              set: function(val) {
                actualFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Sandbox fetch patch failed:', e);
        }
      })();
    </script>
